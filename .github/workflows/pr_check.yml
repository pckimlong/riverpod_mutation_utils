name: PR Checks

on:
  pull_request:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.gitignore'

jobs:
  format-workspace:
    name: Format Workspace
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1

      - name: Verify Dart installation
        run: dart --version

      - name: Get workspace dependencies
        run: dart pub get

      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed .

  validate-packages:
    name: Validate Packages
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - packages/riverpod_mutation_utils
          - packages/riverpod_mutation_utils_generator

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1

      - name: Get workspace dependencies
        run: dart pub get

      - name: Verify package dependencies
        working-directory: ${{ matrix.package }}
        run: dart pub get --dry-run

      - name: Regenerate example code
        if: matrix.package == 'packages/riverpod_mutation_utils'
        working-directory: ${{ matrix.package }}
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Analyze package
        working-directory: ${{ matrix.package }}
        run: dart analyze --fatal-infos --fatal-warnings

      - name: Run package tests
        working-directory: ${{ matrix.package }}
        run: dart test

      - name: Validate package
        working-directory: ${{ matrix.package }}
        run: dart pub publish --dry-run
