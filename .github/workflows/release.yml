name: Create Git Release

on:
  push:
    branches:
      - main
    paths:
      - 'packages/**'

jobs:
  release:
    name: Create Tag and Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - package_name: riverpod_mutation_utils
            package_path: packages/riverpod_mutation_utils
          - package_name: riverpod_mutation_utils_generator
            package_path: packages/riverpod_mutation_utils_generator

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1

      - name: Get workspace dependencies
        run: dart pub get

      - name: Extract version from package pubspec.yaml
        id: version
        run: |
          VERSION=$(grep '^version:' "${{ matrix.package_path }}/pubspec.yaml" | sed 's/version: //')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=${{ matrix.package_name }}-v$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected version for ${{ matrix.package_name }}: $VERSION"

      - name: Detect package changes since last release
        id: changes
        run: |
          LAST_TAG=$(git tag --list "${{ matrix.package_name }}-v*" --sort=-version:refname | head -n 1)
          echo "last_tag=$LAST_TAG" >> "$GITHUB_OUTPUT"

          if [ -z "$LAST_TAG" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "No previous release tag for ${{ matrix.package_name }}; treating as changed"
            exit 0
          fi

          if git diff --quiet "$LAST_TAG"..HEAD -- "${{ matrix.package_path }}"; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes detected for ${{ matrix.package_name }} since $LAST_TAG"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Changes detected for ${{ matrix.package_name }} since $LAST_TAG"
          fi

      - name: Check if tag already exists
        id: check_tag
        run: |
          if git rev-parse "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag ${{ steps.version.outputs.tag }} already exists"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Tag ${{ steps.version.outputs.tag }} does not exist"
          fi

      - name: Require version bump when package changed
        if: steps.changes.outputs.changed == 'true' && steps.check_tag.outputs.exists == 'true'
        run: |
          echo "Package changes were detected for ${{ matrix.package_name }}, but version ${{ steps.version.outputs.version }} is already tagged."
          echo "Bump ${{ matrix.package_path }}/pubspec.yaml before merging to main."
          exit 1

      - name: Validate package before release
        if: steps.changes.outputs.changed == 'true' && steps.check_tag.outputs.exists == 'false'
        run: |
          if [ "${{ matrix.package_name }}" = "riverpod_mutation_utils" ]; then
            (cd "${{ matrix.package_path }}" && dart run build_runner build --delete-conflicting-outputs)
            (cd "${{ matrix.package_path }}" && dart analyze --fatal-infos --fatal-warnings)
            (cd "${{ matrix.package_path }}" && dart test)
          else
            (cd "${{ matrix.package_path }}" && dart analyze --fatal-infos --fatal-warnings)
            (cd "${{ matrix.package_path }}" && dart test)
          fi

      - name: Extract release notes from package changelog
        if: steps.changes.outputs.changed == 'true' && steps.check_tag.outputs.exists == 'false'
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          NOTES=$(awk -v ver="$VERSION" '
            $0 == "## " ver {
              found=1
              next
            }
            /^## / && found {
              exit
            }
            found {
              print
            }
          ' "${{ matrix.package_path }}/CHANGELOG.md")

          if [ -z "$NOTES" ]; then
            NOTES="Release ${{ matrix.package_name }} version $VERSION"
          fi

          echo "$NOTES" > release_notes.txt
          echo "Release notes extracted"

      - name: Create Git Tag
        if: steps.changes.outputs.changed == 'true' && steps.check_tag.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.tag }}" -m "Release ${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub Release
        if: steps.changes.outputs.changed == 'true' && steps.check_tag.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body_path: release_notes.txt
          draft: false
          prerelease: false
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Skip release
        if: steps.changes.outputs.changed == 'false'
        run: |
          echo "Skipping release - no package changes detected for ${{ matrix.package_name }}"
