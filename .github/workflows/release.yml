name: Create Release

on:
  push:
    branches:
      - main
    paths:
      - 'pubspec.yaml'

jobs:
  release:
    name: Create Tag and Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1

      - name: Extract version from pubspec.yaml
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected version: $VERSION"

      - name: Check if tag already exists
        id: check_tag
        run: |
          if git rev-parse "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag ${{ steps.version.outputs.tag }} already exists"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Tag ${{ steps.version.outputs.tag }} does not exist"
          fi

      - name: Validate package before release
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          dart pub get
          dart format --output=none --set-exit-if-changed .
          dart analyze --fatal-infos --fatal-warnings
          dart test
          dart pub publish --dry-run

      - name: Extract release notes from CHANGELOG
        if: steps.check_tag.outputs.exists == 'false'
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          NOTES=$(awk -v ver="$VERSION" '
            $0 == "## " ver {
              found=1
              next
            }
            /^## / && found {
              exit
            }
            found {
              print
            }
          ' CHANGELOG.md)

          if [ -z "$NOTES" ]; then
            NOTES="Release version $VERSION"
          fi

          echo "$NOTES" > release_notes.txt
          echo "Release notes extracted"

      - name: Create Git Tag
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.tag }}" -m "Release ${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub Release
        if: steps.check_tag.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body_path: release_notes.txt
          draft: false
          prerelease: false
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Skip release
        if: steps.check_tag.outputs.exists == 'true'
        run: |
          echo "Skipping release - tag ${{ steps.version.outputs.tag }} already exists"
